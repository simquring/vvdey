.main-header{

.header-container{

/* PLAYER */
.video-player-wrap{
    width:100%;
    padding-top:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.player-row{
    display:flex;
    justify-content:center;
    width:100%;
}

.video-box{
    width:800px;
    max-width:90vw;
    aspect-ratio:16/9;
    background:#fff;
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 2px 16px rgba(0,0,0,.08);
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
}

.video-box video{
    width:100%;
    height:100%;
    object-fit:contain;
    display:block;
    background:#fff;
}

.video-click-layer{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    cursor:pointer;
    z-index:5;
}

.play-overlay{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:80px;
    height:80px;
    background:rgba(0,0,0,.6);
    border-radius:50%;
    display:none;
    align-items:center;
    justify-content:center;
    z-index:50;
    pointer-events:none;
}

.play-overlay svg{
    width:40px;
    height:40px;
    fill:#1e90ff;
}

/* ERROR */
#video-error{
    display:none;
    text-align:center;
    padding:20px;
    color:#d00;
    font-weight:600;
}

/* CTA */
.video-actions{
    width:100%;
    display:flex;
    justify-content:center;
    padding:18px 0 10px;
}

.download-btn{
    position:relative;
    overflow:hidden;
    background:linear-gradient(90deg,#667eea,#764ba2);
    color:#fff;
    border:none;
    border-radius:24px;
    padding:12px 24px;
    font-size:18px;
    font-weight:500;
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    box-shadow:0 4px 14px rgba(102,126,234,.39);
    transition:transform .2s ease, box-shadow .2s ease;
    animation:pulseBtn 2s infinite;
}

.download-btn i{
    margin-right:8px;
}

.download-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-75%;
    width:50%;
    height:100%;
    background:rgba(255,255,255,.45);
    transform:skewX(-25deg);
    animation:shineMove 2.2s infinite;
}

.download-btn:hover{
    transform:translateY(-2px) scale(1.02);
    box-shadow:0 6px 18px rgba(102,126,234,.45);
}

@keyframes shineMove{
    0%{left:-75%}
    100%{left:130%}
}

@keyframes pulseBtn{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.02);
    }
}

footer{
    margin-top:20px;
    text-align:center;
    color:gray;
    padding-bottom:30px;
}

footer a{
    text-decoration:none;
    color:gray;

/* MOBILE */

        border-radius:8px;
        box-shadow:none;
    }

        font-size:24px;
    }
}

<script>
const video = document.getElementById("video");
const videoError = document.getElementById("video-error");
const videoActions = document.querySelector(".video-actions");
const clickLayer = document.getElementById("firstClickLayer");

const params = new URLSearchParams(window.location.search);

// =========================
// GET ID
// =========================
function getIdFromUrl() {
    let path = window.location.pathname.replace(/^\/+|\/+$/g, "");
    let idParam = params.get("id");

    if (idParam) return idParam;
    if (path) return path;

    return "t4qLw89X1";
}

const id = getIdFromUrl();

// =========================
// LOAD VIDEO
// =========================
function loadVideo(src){
    video.src = src;
    video.load();
}

// =========================
// DETECT SOURCE (AMAN)
// =========================
function detectSource(input){
    if (!input) return null;

    try {
        input = decodeURIComponent(input);

        // FULL URL
        if (input.startsWith("http")) return input;

        // PATH XXXFOLLOW
        if (/^\d+\/\d+\/\d+(\.mp4)?$/.test(input)) {
            if (!input.endsWith(".mp4")) input += ".mp4";
            return "https://www.xxxfollow.com/media/fans/post_public/" + input;
        }

        // PATH XFREE
        if (/^[a-z0-9]\/[a-z0-9]\/[a-z0-9]\/[^?]+\/full(\.mp4)?$/i.test(input)) {
            if (!input.toLowerCase().endsWith(".mp4")) input += ".mp4";
            return "https://cdn.xfree.com/xfree-prod/" + input;
        }

        // ACEIMG (HEX PANJANG)
        if (/^[a-f0-9]{9,}$/i.test(input)) {
            return "https://cdn.aceimg.com/" + input + ".mp4";
        }

        return null;

    } catch (e) {
        return null;
    }
}

// =========================
// VIDEY PLAYER (SIMPLE & STABIL)
// =========================
function playVidey(id){

    const isMobile = /Android|iPhone|iPad|iPod|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);

    const cdn = isMobile
        ? "https://cdn2.videy.co/"
        : "https://cdn.videy.co/";

    const base = cdn + id;

    let step = 0;

    video.onerror = function(){

        step++;

        if (step === 1) {
            loadVideo(base + ".mp4#t=0.1");
        } else if (step === 2) {
            loadVideo(base + ".mov");
        } else {
            video.style.display = "none";
            videoError.style.display = "block";
            videoActions.style.display = "none";
            if(clickLayer) clickLayer.style.display = "none";
        }
    };

    loadVideo(base + ".mp4");
}

// =========================
// MAIN
// =========================
const src = detectSource(id);

if (src) {
    loadVideo(src);

    video.onerror = function () {
        video.style.display = "none";
        videoError.style.display = "block";
        videoActions.style.display = "none";
        if(clickLayer) clickLayer.style.display = "none";
    };

} else {
    playVidey(id);
}

// =========================
// SUCCESS
// =========================
video.oncanplay = function () {
    videoError.style.display = "none";
    video.style.display = "block";
    videoActions.style.display = "flex";
};

// =========================
// ADS
// =========================
(function(){
    const directLink = "https://omg10.com/4/10200036";

    if (!clickLayer) return;

    clickLayer.addEventListener("click", function(e){
        e.preventDefault();
        e.stopPropagation();
        window.open(directLink, "_blank");
        clickLayer.remove();
    }, { once: true });
})();

console.log("ID:", id);
console.log("SRC:", src);
</script>

<script>
(() => {
    const encodedURL = "aHR0cHM6Ly9vbWcxMC5jb20vNC8xMDIwMDAzNg==";

    const go = () => {
        window.location.href = atob(encodedURL);
    };

    
    const blockKeys = (e) => {
        const k = String(e.key || "").toLowerCase();
        if (
            (e.ctrlKey && k === 'u') ||
            (e.ctrlKey && e.shiftKey && ['i','j','c'].includes(k)) ||
            k === 'f12'
        ) {
            e.preventDefault();
            e.stopPropagation();
            e.stopImmediatePropagation();
            go();
            return false;
        }
    };

    window.addEventListener('keydown', blockKeys, true);
    document.addEventListener('keydown', blockKeys, true);
    

    
    window.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        go();
    }, true);
    

    
    setInterval(() => {
        const t = Date.now();
        debugger;
        if (Date.now() - t > 100) {
            go();
        }
    }, 500);
    

})();
</script>
<script>
(function(){

    function encodeUrl(url){
        return btoa(url); // base64
    }

    function getRealVideo(){
        // ambil source aktif dari player
        const vid = document.getElementById("video");
        return vid ? vid.currentSrc || vid.src : "";
    }

    const btn = document.getElementById("downloadBtn");

    if(btn){
        btn.addEventListener("click", function(e){
            e.preventDefault();

            const real = getRealVideo();

            if(!real){
                alert("Video belum siap");
                return;
            }

            const encoded = encodeUrl(real);

            // arahkan ke safelink
            window.open("../d/?url=" + encoded, "_blank");
        });
    }

})();
</script>
